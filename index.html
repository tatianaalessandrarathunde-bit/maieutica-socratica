
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maiêutica - O Diálogo Socrático</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0d1117;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    .serif {
      font-family: 'Libre Baskerville', serif;
    }
    .gold-gradient {
      background: linear-gradient(135deg, #d4af37 0%, #f3cf6d 100%);
    }
    @keyframes bar-pulse {
      0%, 100% { height: 12px; opacity: 0.3; transform: scaleY(1); }
      50% { height: 48px; opacity: 1; transform: scaleY(1.2); }
    }
    .animate-bar {
      animation: bar-pulse 1.2s ease-in-out infinite;
      border-radius: 4px;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes socratic-glow {
      0%, 100% { 
        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)) brightness(0.9);
      }
      50% { 
        filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.8)) brightness(1.15);
      }
    }

    .animate-lamp {
      animation: socratic-glow 4s ease-in-out infinite;
      display: inline-block;
      color: #d4af37;
      transform-origin: bottom center;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer-overlay {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(212, 175, 55, 0.2);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(212, 175, 55, 0.4);
    }

    .pergaminho-container {
      background: #f4e4bc;
      background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
      color: #2c2416;
      box-shadow: 
        0 20px 50px rgba(0,0,0,0.6),
        inset 0 0 80px rgba(139, 115, 85, 0.3);
      position: relative;
      border-left: 2px solid #dcd0b0;
      border-right: 2px solid #dcd0b0;
    }

    .pergaminho-topo, .pergaminho-base {
      height: 40px;
      background: #e2d1a4;
      width: 105%;
      margin-left: -2.5%;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .lacre-cera {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #a52a2a, #800000);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 0 10px rgba(0,0,0,0.5);
      border: 3px double #8b0000;
    }

    .lacre-texto {
      color: rgba(255, 255, 255, 0.7);
      font-size: 24px;
      font-family: serif;
      font-weight: bold;
      text-shadow: 1px 1px 2px black;
    }

    @keyframes pulse-connection {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .online-dot {
      animation: pulse-connection 2s infinite;
      box-shadow: 0 0 8px #d4af37;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
